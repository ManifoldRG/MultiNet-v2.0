[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "multinet-v2-0"
version = "0.1.0"
description = "Gridworld and multigrid evaluation harness for multimodal model benchmarking."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "gymnasium",
    "minigrid",
    "numpy",
    "pillow",
]

[project.optional-dependencies]
dev = [
    "pytest",
]
visual = [
    "matplotlib",
    "pygame",
]
hf = [
    "torch",
    "transformers",
]

[tool.setuptools]
include-package-data = true
py-modules = [
    "model_interface",
]

[tool.setuptools.packages.find]
where = ["."]
include = [
    "gridworld*",
    "mazes*",
    "multigrid*",
]

[tool.setuptools.package-data]
gridworld = ["tasks/**/*.json", "tasks/*.json"]
mazes = ["validation_10/**/*.json", "validation_10/*.json"]
